<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课配置生成器</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover-color: #4338ca;
            --danger-color: #ef4444;
            --danger-hover-color: #dc2626;
            --background-gradient-start: #f3f4f6;
            --background-gradient-end: #e5e7eb;
            --text-color: #1f2937;
            --subtle-text-color: #6b7280;
            --card-bg-color: #ffffff;
            --border-color: #d1d5db;
            --input-bg-color: #f9fafb;
            --code-bg-color: #1f2937;
            --code-text-color: #d1d5db;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --border-radius-lg: 12px;
            --border-radius-md: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--background-gradient-start), var(--background-gradient-end));
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
        }

        .form-column,
        .json-column {
            padding: 40px;
        }

        .form-column {
            flex: 1;
            min-width: 320px;
            border-right: 1px solid var(--border-color);
        }

        .json-column {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            background-color: var(--code-bg-color);
        }

        h1 {
            font-size: 2em;
            color: var(--text-color);
            margin: 0 0 30px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 svg {
            width: 1.2em;
            height: 1.2em;
            fill: var(--primary-color);
        }

        h2 {
            font-size: 1.2em;
            color: var(--text-color);
            margin-top: 30px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        h2 svg {
            width: 1em;
            height: 1em;
            fill: var(--subtle-text-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .required-indicator {
            color: var(--danger-color);
            font-weight: bold;
        }

        .form-hint {
            font-size: 14px;
            color: var(--subtle-text-color);
            background-color: var(--input-bg-color);
            padding: 10px 15px;
            border-radius: var(--border-radius-md);
            margin-bottom: 20px;
            line-height: 1.6;
            border-left: 3px solid var(--primary-color);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            border-radius: var(--border-radius-md);
            border: 1px solid var(--border-color);
            background-color: var(--input-bg-color);
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
            font-size: 16px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button {
            border: none;
            border-radius: var(--border-radius-md);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button svg {
            width: 1.2em;
            height: 1.2em;
        }

        #add-course-btn {
            background: linear-gradient(45deg, var(--primary-color), #6d28d9);
            color: #fff;
            padding: 12px 24px;
            width: 100%;
            margin-top: 10px;
        }

        #add-course-btn svg {
            fill: #fff;
        }

        #add-course-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .course-card {
            border: 1px solid var(--border-color);
            padding: 20px;
            margin-bottom: 15px;
            border-radius: var(--border-radius-md);
            background: #fff;
            transition: box-shadow 0.3s;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .course-fields {
            flex-grow: 1;
        }

        .course-card:focus-within {
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        .remove-course-btn {
            background: transparent;
            color: var(--subtle-text-color);
            padding: 5px;
            line-height: 1;
            margin-top: 8px;
            /* Vertically align with the first input */
        }

        .remove-course-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .remove-course-btn:hover {
            color: var(--danger-color);
            transform: scale(1.1);
        }

        .json-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .json-header h2 {
            color: #fff;
            margin: 0;
        }

        .json-header h2 svg {
            fill: var(--subtle-text-color);
        }

        #copy-json-btn {
            background: transparent;
            color: var(--subtle-text-color);
            padding: 5px;
        }

        #copy-json-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        #copy-json-btn:hover {
            color: #fff;
        }

        pre {
            flex-grow: 1;
            background: var(--code-bg-color);
            color: var(--code-text-color);
            padding: 20px;
            border-radius: var(--border-radius-md);
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
            overflow-y: auto;
            border: 1px solid #374151;
            margin: 0;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translate(-50%, 100px);
            background-color: #22c55e;
            color: white;
            padding: 12px 24px;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: transform 0.4s, opacity 0.4s, visibility 0.4s;
            z-index: 1000;
        }

        #toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 992px) {
            body {
                padding: 0;
                align-items: flex-start;
            }

            .container {
                flex-direction: column;
                border-radius: 0;
                width: 100%;
                height: auto;
            }

            .form-column {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="form-column">
            <h1><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path
                        d="M12 1.599l-2.828 2.829 1.414 1.414L12 4.428l1.414 1.414 1.414-1.414L12 1.599zM19.598 12l2.829 2.828-1.414 1.414L19.584 12l1.414-1.414-1.414-1.414 2.829 2.828zM4.402 12l-2.829-2.828 1.414-1.414L4.416 12l-1.414 1.414 1.414 1.414L4.402 12zm7.597 7.999l2.828 2.829-1.414 1.414L12 20.428l-1.414 1.414-1.414-1.414 2.828-2.829zM12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8z">
                    </path>
                </svg>选课配置生成器</h1>

            <div class="form-section">
                <h2><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path
                            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z">
                        </path>
                    </svg>用户信息</h2>
                <div class="form-group">
                    <label for="user_account">学号/账号 <span class="required-indicator">*</span></label>
                    <input type="text" id="user_account" placeholder="请输入您的学号或账号">
                </div>
                <div class="form-group">
                    <label for="user_password">密码 <span class="required-indicator">*</span></label>
                    <input type="password" id="user_password" placeholder="请输入您的密码">
                </div>
                <div class="form-group">
                    <label for="feishu_webhook">飞书 Webhook 链接 (可选)</label>
                    <input type="text" id="feishu_webhook" placeholder="用于接收选课结果通知">
                </div>
            </div>

            <div class="courses-section">
                <h2><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path
                            d="M21 21H3a1 1 0 0 1-1-1v-4h2v3h16V5H5v3H3V4a1 1 0 0 1 1-1h16a1 1 0 0 1 1 1v16a1 1 0 0 1-1 1zM3 13h6v-2H3v2zm0-4h6V7H3v2z">
                        </path>
                    </svg>课程信息</h2>
                <div class="form-hint">
                    <strong>提示：</strong><br>
                    - <b>选课链接：</b>请长按选课页面的蓝色选课按钮，复制链接地址。若长按无效，请尝试更换系统浏览器或使用电脑操作。<br>
                    - <b>查找课程：</b>补选阶段可直接搜索；正选阶段建议借助同专业高年级同学的账号进行搜索。
                </div>
                <div id="courses-container">
                    <!-- Course cards will be added here dynamically -->
                </div>
                <button id="add-course-btn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2h6z"></path>
                    </svg>添加课程</button>
            </div>
        </div>
        <div class="json-column">
            <div class="json-header">
                <h2><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path
                            d="M9.341 4.44a1 1 0 0 1 1.318-1.318l12 12a1 1 0 0 1-1.318 1.318l-12-12zm-3.682 9.242L2 12l3.659-1.682a1 1 0 0 1 .682 1.838L5.166 12l1.175.54a1 1 0 0 1-.682 1.838zm7.341.636L14.834 12l-1.175-.54a1 1 0 1 1 .682-1.838L18 11.318l3.659 1.682a1 1 0 0 1 0 1.732l-3.66 1.682a1 1 0 1 1-.682-1.838L14.834 12z">
                        </path>
                    </svg>JSON 配置</h2>
                <button id="copy-json-btn" title="复制"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path
                            d="M7 6V3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-3v3c0 .552-.45 1-1.007 1H4.007A1.001 1.001 0 0 1 3 21l.003-14c0-.552.45-1 1.007-1H7zM5.003 8L5 20h10V8H5.003zM9 6h8v12h2V4H9v2z">
                        </path>
                    </svg></button>
            </div>
            <pre id="json-output"></pre>
        </div>
    </div>

    <div id="toast">已复制到剪贴板</div>

    <template id="course-card-template">
        <div class="course-card">
            <div class="course-fields">
                <div class="form-group">
                    <label>课程名称 <span class="required-indicator">*</span></label>
                    <input type="text" class="course_name" placeholder="例如: 计算机网络">
                </div>
                <div class="form-group">
                    <label>课程编号 <span class="required-indicator">*</span></label>
                    <input type="text" class="course_id" placeholder="例如: 081203A004">
                </div>
                <div class="form-group">
                    <label>老师名称 <span class="required-indicator">*</span></label>
                    <input type="text" class="teacher_name" placeholder="例如: 张三">
                </div>
                <div class="form-group">
                    <label>选课链接 <span class="required-indicator">*</span></label>
                    <input type="text" class="selection_link" placeholder="粘贴完整的javascript:...">
                </div>
            </div>
            <button class="remove-course-btn" title="删除"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M6 18a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8H6v10zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"></path>
                </svg></button>
        </div>
    </template>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userAccountInput = document.getElementById('user_account');
            const userPasswordInput = document.getElementById('user_password');
            const feishuWebhookInput = document.getElementById('feishu_webhook');
            const coursesContainer = document.getElementById('courses-container');
            const addCourseBtn = document.getElementById('add-course-btn');
            const jsonOutput = document.getElementById('json-output');
            const courseCardTemplate = document.getElementById('course-card-template');
            const copyJsonBtn = document.getElementById('copy-json-btn');
            const toast = document.getElementById('toast');
            const CACHE_KEY = 'courseConfigCache';

            function saveDataToCache() {
                const data = {
                    user_account: userAccountInput.value,
                    user_password: userPasswordInput.value,
                    feishu_webhook: feishuWebhookInput.value,
                    courses: []
                };

                const courseCards = coursesContainer.querySelectorAll('.course-card');
                courseCards.forEach(card => {
                    const course = {
                        course_name: card.querySelector('.course_name').value,
                        course_id: card.querySelector('.course_id').value,
                        teacher_name: card.querySelector('.teacher_name').value,
                        selection_link: card.querySelector('.selection_link').value
                    };
                    data.courses.push(course);
                });

                localStorage.setItem(CACHE_KEY, JSON.stringify(data));
            }

            function generateJson() {
                const data = {
                    user_account: userAccountInput.value,
                    user_password: userPasswordInput.value,
                    feishu_webhook: feishuWebhookInput.value,
                    courses: []
                };

                const courseCards = coursesContainer.querySelectorAll('.course-card');
                courseCards.forEach(card => {
                    const selectionLink = card.querySelector('.selection_link').value;
                    const linkRegex = /javascript:\w+\('([^']*)','([^']*)',/;
                    const matches = selectionLink.match(linkRegex);

                    let jx0404id = '';
                    let jx02id = '';

                    if (matches && matches.length >= 3) {
                        jx0404id = matches[1];
                        jx02id = matches[2];
                    }

                    const course = {
                        course_name: card.querySelector('.course_name').value,
                        course_id: card.querySelector('.course_id').value,
                        teacher_name: card.querySelector('.teacher_name').value,
                        jx02id: jx02id,
                        jx0404id: jx0404id
                    };
                    data.courses.push(course);
                });

                jsonOutput.textContent = JSON.stringify(data, null, 4);
            }

            function onInputChange() {
                generateJson();
                saveDataToCache();
            }

            function addCourseCard(courseData = null) {
                const cardClone = courseCardTemplate.content.cloneNode(true);
                const removeBtn = cardClone.querySelector('.remove-course-btn');

                if (courseData) {
                    cardClone.querySelector('.course_name').value = courseData.course_name || '';
                    cardClone.querySelector('.course_id').value = courseData.course_id || '';
                    cardClone.querySelector('.teacher_name').value = courseData.teacher_name || '';
                    cardClone.querySelector('.selection_link').value = courseData.selection_link || '';
                }

                removeBtn.addEventListener('click', (event) => {
                    event.target.closest('.course-card').remove();
                    onInputChange();
                });

                const inputs = cardClone.querySelectorAll('input');
                inputs.forEach(input => {
                    input.addEventListener('input', onInputChange);
                });

                coursesContainer.appendChild(cardClone);
            }

            function loadDataFromCache() {
                const cachedDataJSON = localStorage.getItem(CACHE_KEY);
                if (cachedDataJSON) {
                    try {
                        const cachedData = JSON.parse(cachedDataJSON);
                        userAccountInput.value = cachedData.user_account || '';
                        userPasswordInput.value = cachedData.user_password || '';
                        feishuWebhookInput.value = cachedData.feishu_webhook || '';

                        coursesContainer.innerHTML = '';
                        if (cachedData.courses && cachedData.courses.length > 0) {
                            cachedData.courses.forEach(course => addCourseCard(course));
                        } else {
                            addCourseCard();
                        }
                    } catch (e) {
                        console.error("Failed to parse cache", e);
                        addCourseCard(); // Load default if cache is corrupted
                    }
                } else {
                    addCourseCard();
                }
                onInputChange();
            }

            // Attach event listeners to main inputs
            [userAccountInput, userPasswordInput, feishuWebhookInput].forEach(input => {
                input.addEventListener('input', onInputChange);
            });

            // "Add Course" button listener
            addCourseBtn.addEventListener('click', () => {
                addCourseCard();
                onInputChange();
            });

            function showToast() {
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // "Copy JSON" button listener
            copyJsonBtn.addEventListener('click', () => {
                const jsonString = jsonOutput.textContent;
                if (!jsonString || jsonString.trim() === '{}' || jsonString.trim() === '') {
                    alert('没有可复制的内容');
                    return;
                }
                navigator.clipboard.writeText(jsonString).then(() => {
                    showToast();
                }).catch(err => {
                    console.error('无法复制JSON: ', err);
                    alert('复制失败!');
                });
            });

            // Load data from cache and generate initial view
            loadDataFromCache();
        });
    </script>
</body>

</html>
