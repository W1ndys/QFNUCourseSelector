<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课配置生成器</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover-color: #4f46e5;
            --danger-color: #ef4444;
            --danger-hover-color: #dc2626;
            --success-color: #22c55e;
            --background-color: #f8fafc;
            --text-color: #0f172a;
            --subtle-text-color: #64748b;
            --card-bg-color: rgba(255, 255, 255, 0.9);
            --border-color: #e2e8f0;
            --input-bg-color: #f1f5f9;
            --code-bg-color: #1e293b;
            --code-text-color: #e2e8f0;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --border-radius-lg: 16px;
            --border-radius-md: 10px;
        }

        @keyframes fadeInSlide {
            from {
                opacity: 0;
                transform: translateY(-10px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes subtlePulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--background-color);
            background-image:
                radial-gradient(circle at 1px 1px, #e2e8f0 1px, transparent 0),
                radial-gradient(circle at 15px 15px, #e2e8f0 1px, transparent 0);
            background-size: 30px 30px;
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--card-bg-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .form-column,
        .json-column {
            padding: 48px;
        }

        .form-column {
            flex: 1.2;
            min-width: 360px;
            border-right: 1px solid var(--border-color);
        }

        .json-column {
            flex: 1;
            min-width: 360px;
            display: flex;
            flex-direction: column;
            background-color: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
        }

        h1 {
            font-size: 2.25em;
            color: var(--text-color);
            margin: 0 0 32px 0;
            display: flex;
            align-items: center;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        h2 {
            font-size: 1.25em;
            color: var(--text-color);
            margin-top: 32px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .required-indicator {
            color: var(--danger-color);
            font-weight: bold;
            margin-left: 4px;
        }

        .form-hint {
            font-size: 14px;
            color: var(--subtle-text-color);
            background-color: var(--input-bg-color);
            padding: 12px 16px;
            border-radius: var(--border-radius-md);
            margin-bottom: 24px;
            line-height: 1.6;
            border-left: 4px solid var(--primary-color);
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--border-radius-md);
            border: 1px solid var(--border-color);
            background-color: #fff;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-size: 16px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            border: none;
            border-radius: var(--border-radius-md);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            user-select: none;
        }

        #add-course-btn {
            background: var(--primary-color);
            color: #fff;
            padding: 14px 28px;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        #add-course-btn:hover {
            background: var(--primary-hover-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .course-card {
            border: 1px solid var(--border-color);
            padding: 24px;
            margin-bottom: 16px;
            border-radius: var(--border-radius-md);
            background: #fff;
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            max-height: 500px;
            overflow: hidden;
            position: relative;
        }

        .course-card.removing {
            opacity: 0;
            transform: scale(0.95) translateX(-20px);
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            margin-bottom: 0;
            border-width: 0;
        }

        .course-card.newly-added {
            animation: fadeInSlide 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .course-fields {
            flex-grow: 1;
        }

        .course-card:focus-within {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            border-color: var(--primary-color);
        }

        .remove-course-btn {
            background: transparent;
            color: var(--subtle-text-color);
            padding: 8px;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            position: absolute;
            top: 16px;
            right: 16px;
        }

        .remove-course-btn:hover {
            color: #fff;
            background-color: var(--danger-color);
            transform: rotate(90deg) scale(1.1);
        }

        .json-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .json-header h2 {
            color: #fff;
            border: none;
        }

        #copy-json-btn {
            background: #475569;
            color: #fff;
            padding: 8px 16px;
            font-size: 14px;
        }

        #copy-json-btn:hover {
            background: #334155;
        }

        pre {
            flex-grow: 1;
            background: var(--code-bg-color);
            color: var(--code-text-color);
            padding: 24px;
            border-radius: var(--border-radius-md);
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: "Fira Code", Menlo, Monaco, Consolas, "Courier New", monospace;
            overflow-y: auto;
            border: 1px solid #334155;
            margin: 0;
            line-height: 1.7;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translate(-50%, 100px);
            background-color: var(--success-color);
            color: white;
            padding: 14px 28px;
            border-radius: var(--border-radius-lg);
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            opacity: 0;
            visibility: hidden;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.4s, visibility 0.4s;
            z-index: 1000;
        }

        #toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 992px) {
            body {
                padding: 0;
                align-items: flex-start;
            }

            .container {
                flex-direction: column;
                border-radius: 0;
                width: 100%;
                height: auto;
                border: none;
            }

            .form-column {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 32px 24px;
            }

            .json-column {
                padding: 32px 24px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="form-column">
            <h1>
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z" />
                </svg>
                选课配置生成器
            </h1>

            <div class="form-section">
                <h2>
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                    </svg>
                    用户信息
                </h2>
                <div class="form-group">
                    <label for="user_account">学号/账号 <span class="required-indicator">*</span></label>
                    <input type="text" id="user_account" placeholder="请输入您的学号或账号">
                </div>
                <div class="form-group">
                    <label for="user_password">密码 <span class="required-indicator">*</span></label>
                    <input type="password" id="user_password" placeholder="请输入您的密码">
                </div>
                <div class="form-group">
                    <label for="feishu_webhook">飞书 Webhook 链接 (可选)</label>
                    <input type="text" id="feishu_webhook" placeholder="用于接收选课结果通知">
                </div>
            </div>

            <div class="courses-section">
                <h2>
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z" />
                    </svg>
                    课程信息
                </h2>
                <div class="form-hint">
                    <strong>提示：</strong><br>
                    - <b>选课链接：</b>请长按选课页面的蓝色选课按钮，复制链接地址。若长按无效，请尝试更换系统浏览器或使用电脑操作。<br>
                    - <b>查找课程：</b>补选阶段可直接搜索；正选阶段建议借助同专业高年级同学的账号进行搜索。
                </div>
                <div id="courses-container">
                    <!-- Course cards will be added here dynamically -->
                </div>
                <button id="add-course-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    添加课程
                </button>
            </div>
        </div>
        <div class="json-column">
            <div class="json-header">
                <h2>
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z" />
                    </svg>
                    JSON 配置
                </h2>
                <button id="copy-json-btn" title="复制">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    复制
                </button>
            </div>
            <pre id="json-output"></pre>
        </div>
    </div>

    <div id="toast">已复制到剪贴板</div>

    <template id="course-card-template">
        <div class="course-card">
            <div class="course-fields">
                <div class="form-group">
                    <label>课程名称 <span class="required-indicator">*</span></label>
                    <input type="text" class="course_name" placeholder="例如: 计算机网络">
                </div>
                <div class="form-group">
                    <label>课程编号 <span class="required-indicator">*</span></label>
                    <input type="text" class="course_id" placeholder="例如: 081203A004">
                </div>
                <div class="form-group">
                    <label>老师名称 <span class="required-indicator">*</span></label>
                    <input type="text" class="teacher_name" placeholder="例如: 张三">
                </div>
                <div class="form-group">
                    <label>选课链接 <span class="required-indicator">*</span></label>
                    <input type="text" class="selection_link" placeholder="粘贴完整的javascript:...">
                </div>
            </div>
            <button class="remove-course-btn" title="删除">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </template>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userAccountInput = document.getElementById('user_account');
            const userPasswordInput = document.getElementById('user_password');
            const feishuWebhookInput = document.getElementById('feishu_webhook');
            const coursesContainer = document.getElementById('courses-container');
            const addCourseBtn = document.getElementById('add-course-btn');
            const jsonOutput = document.getElementById('json-output');
            const courseCardTemplate = document.getElementById('course-card-template');
            const copyJsonBtn = document.getElementById('copy-json-btn');
            const toast = document.getElementById('toast');
            const CACHE_KEY = 'courseConfigCache';

            function saveDataToCache() {
                const data = {
                    user_account: userAccountInput.value,
                    user_password: userPasswordInput.value,
                    feishu_webhook: feishuWebhookInput.value,
                    courses: []
                };

                const courseCards = coursesContainer.querySelectorAll('.course-card');
                courseCards.forEach(card => {
                    const course = {
                        course_name: card.querySelector('.course_name').value,
                        course_id: card.querySelector('.course_id').value,
                        teacher_name: card.querySelector('.teacher_name').value,
                        selection_link: card.querySelector('.selection_link').value
                    };
                    data.courses.push(course);
                });

                localStorage.setItem(CACHE_KEY, JSON.stringify(data));
            }

            function generateJson() {
                const data = {
                    user_account: userAccountInput.value,
                    user_password: userPasswordInput.value,
                    feishu_webhook: feishuWebhookInput.value,
                    courses: []
                };

                const courseCards = coursesContainer.querySelectorAll('.course-card');
                courseCards.forEach(card => {
                    const selectionLink = card.querySelector('.selection_link').value;
                    const linkRegex = /javascript:\w+\('([^']*)','([^']*)',/;
                    const matches = selectionLink.match(linkRegex);

                    let jx0404id = '';
                    let jx02id = '';

                    if (matches && matches.length >= 3) {
                        jx0404id = matches[1];
                        jx02id = matches[2];
                    }

                    const course = {
                        course_name: card.querySelector('.course_name').value,
                        course_id: card.querySelector('.course_id').value,
                        teacher_name: card.querySelector('.teacher_name').value,
                        jx02id: jx02id,
                        jx0404id: jx0404id
                    };
                    data.courses.push(course);
                });

                jsonOutput.textContent = JSON.stringify(data, null, 4);
            }

            function onInputChange() {
                generateJson();
                saveDataToCache();
            }

            function addCourseCard(courseData = null, animate = false) {
                const cardClone = courseCardTemplate.content.cloneNode(true);
                const cardElement = cardClone.querySelector('.course-card');
                const removeBtn = cardClone.querySelector('.remove-course-btn');

                if (courseData) {
                    cardClone.querySelector('.course_name').value = courseData.course_name || '';
                    cardClone.querySelector('.course_id').value = courseData.course_id || '';
                    cardClone.querySelector('.teacher_name').value = courseData.teacher_name || '';
                    cardClone.querySelector('.selection_link').value = courseData.selection_link || '';
                }

                removeBtn.addEventListener('click', (event) => {
                    const cardToRemove = event.target.closest('.course-card');
                    if (cardToRemove) {
                        cardToRemove.classList.add('removing');
                        cardToRemove.addEventListener('transitionend', () => {
                            cardToRemove.remove();
                            onInputChange();
                        }, { once: true });
                    }
                });

                const inputs = cardClone.querySelectorAll('input');
                inputs.forEach(input => {
                    input.addEventListener('input', onInputChange);
                });

                coursesContainer.appendChild(cardClone);

                if (animate) {
                    cardElement.classList.add('newly-added');
                    cardElement.addEventListener('animationend', () => {
                        cardElement.classList.remove('newly-added');
                    }, { once: true });
                }
            }

            function loadDataFromCache() {
                const cachedDataJSON = localStorage.getItem(CACHE_KEY);
                if (cachedDataJSON) {
                    try {
                        const cachedData = JSON.parse(cachedDataJSON);
                        userAccountInput.value = cachedData.user_account || '';
                        userPasswordInput.value = cachedData.user_password || '';
                        feishuWebhookInput.value = cachedData.feishu_webhook || '';

                        coursesContainer.innerHTML = '';
                        if (cachedData.courses && cachedData.courses.length > 0) {
                            cachedData.courses.forEach(course => addCourseCard(course));
                        } else {
                            addCourseCard();
                        }
                    } catch (e) {
                        console.error("Failed to parse cache", e);
                        addCourseCard(); // Load default if cache is corrupted
                    }
                } else {
                    addCourseCard();
                }
                onInputChange();
            }

            // Attach event listeners to main inputs
            [userAccountInput, userPasswordInput, feishuWebhookInput].forEach(input => {
                input.addEventListener('input', onInputChange);
            });

            // "Add Course" button listener
            addCourseBtn.addEventListener('click', () => {
                addCourseCard(null, true);
                onInputChange();
            });

            function showToast() {
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // "Copy JSON" button listener
            copyJsonBtn.addEventListener('click', () => {
                const jsonString = jsonOutput.textContent;
                if (!jsonString || jsonString.trim() === '{}' || jsonString.trim() === '') {
                    alert('没有可复制的内容');
                    return;
                }
                navigator.clipboard.writeText(jsonString).then(() => {
                    showToast();
                }).catch(err => {
                    console.error('无法复制JSON: ', err);
                    alert('复制失败!');
                });
            });

            // Load data from cache and generate initial view
            loadDataFromCache();
        });
    </script>
</body>

</html>
